<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atölye OS - Üretim Yönetim Sistemi</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0A0E1A;
            color: #E8EBF0;
            font-family: 'Inter', sans-serif;
        }
        #root {
            width: 100%;
            min-height: 100vh;
        }
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: #0A0E1A;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .loading h1 {
            color: #38BDF8;
            font-family: 'Montserrat', sans-serif;
            font-size: 2.5rem;
            margin-bottom: 20px;
        }
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid #2A3040;
            border-top-color: #38BDF8;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="loading" class="loading">
        <h1>Atölye OS</h1>
        <div class="loading-spinner"></div>
        <p>Yükleniyor...</p>
    </div>
    <div id="root"></div>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel">
        fetch('app.jsx')
            .then(r => r.text())
            .then(code => {
                const modifiedCode = code.replace('export default function App', 'function App');
                const compiledCode = Babel.transform(modifiedCode, { presets: ['react'] }).code;
                eval(compiledCode);
                const root = ReactDOM.createRoot(document.getElementById('root'));
                root.render(React.createElement(App));
                document.getElementById('loading').style.display = 'none';
            })
            .catch(err => {
                console.error('Hata:', err);
                document.getElementById('loading').innerHTML = '<h1>Yükleme Hatası</h1><p>Lütfen sayfayı yenileyin</p>';
            });
    </script>
</body>
</html>
